name: release

# Publish on any update to main: cross-compiled binaries to a GitHub Release
# and a container image to GitHub Packages (GHCR).
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        # Monotonic, human-readable tag for each push to main.
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  release:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Cross-compile all targets
        # Build every target on one runner so there is no cross-job artifact
        # round-trip (the upload/download-artifact step was the failure point).
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            export GOOS="${target%/*}" GOARCH="${target#*/}"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            echo "building kelper-${GOOS}-${GOARCH}${ext}"
            CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
              -o "dist/kelper-${GOOS}-${GOARCH}${ext}" ./cmd/kelper
          done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  image:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.version.outputs.tag }}
            ${{ env.IMAGE }}:${{ github.sha }}

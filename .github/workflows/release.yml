name: release

# Publish on any update to main: cross-compiled binaries to a GitHub Release
# and a container image to GitHub Packages (GHCR).
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        # Monotonic, human-readable tag for each push to main.
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  binaries:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dist/kelp-${GOOS}-${GOARCH}${ext}"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/kelp
      - uses: actions/upload-artifact@v4
        with:
          name: kelp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: [version, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  image:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.version.outputs.tag }}
            ${{ env.IMAGE }}:${{ github.sha }}
